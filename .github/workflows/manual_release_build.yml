name: Manual Full Release Build
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Disable Gradle Cache & Watcher
        run: |
          sed -i 's/org.gradle.configuration-cache=true/org.gradle.configuration-cache=false/g' gradle.properties
          echo "org.gradle.vfs.watch=false" >> gradle.properties

      - name: Mock Firebase/Google Services
        run: |
          echo '{
            "project_info": {"project_number": "12345", "project_id": "hadev"},
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:12345:android:12345",
                  "android_client_info": {
                    "package_name": "io.homeassistant.companion.android"
                  }
                },
                "api_key": [{"current_key": "mock_key"}],
                "services": {"appinvite_service": {"other_platform_oauth_client": []}}
              }
            ],
            "configuration_version": "1"
          }' > app/google-services.json
          cp app/google-services.json wear/google-services.json
          cp app/google-services.json automotive/google-services.json

      - name: Decode Keystore
        run: |
          # Create folder if it doesn't exist
          mkdir -p app
          # Decode the secret into the app folder
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 --decode > app/release.keystore
      
      - name: Build Release APK
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleFullRelease \
            -Pandroid.injected.signing.store.file=app/release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.ANDROID_KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.ANDROID_KEY_PASSWORD }} \
            -x versionFile \
            -x lint \
            --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HomeAssistantRelease
          path: app/build/outputs/apk/full/release/*.apk
