name: Manual Release Build
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Force Disable Cache & Mock Secrets
        run: |
          sed -i 's/org.gradle.configuration-cache=true/org.gradle.configuration-cache=false/g' gradle.properties
          echo "org.gradle.vfs.watch=false" >> gradle.properties
          
      - name: Mock Google Services
        run: |
          # CHANGE: Package name is now the production "io.homeassistant.companion.android"
          echo '{
            "project_info": {"project_number": "12345", "project_id": "haprod"},
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:12345:android:12345",
                  "android_client_info": {
                    "package_name": "io.homeassistant.companion.android"
                  }
                },
                "api_key": [{"current_key": "mock_key"}],
                "services": {"appinvite_service": {"other_platform_oauth_client": []}}
              }
            ],
            "configuration_version": "1"
          }' > app/google-services.json
          cp app/google-services.json wear/google-services.json
          cp app/google-services.json automotive/google-services.json

      - name: Build Release APK
        run: |
          chmod +x gradlew
          # We tell Gradle to use the 'debug' signing configuration for the 'release' build
          ./gradlew :app:assembleFullRelease \
            -Pandroid.signingConfigs.release.storeFile=$HOME/.android/debug.keystore \
            -Pandroid.signingConfigs.release.storePassword=android \
            -Pandroid.signingConfigs.release.keyAlias=androiddebugkey \
            -Pandroid.signingConfigs.release.keyPassword=android \
            -x versionFile \
            -x lint \
            --no-daemon
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: HomeAssistant-Release-Unsigned
          # CHANGE: Path updated to the release folder
          path: app/build/outputs/apk/full/release/*.apk