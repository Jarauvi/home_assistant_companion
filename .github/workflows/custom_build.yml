name: Hei Koti Force Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Mock Google Services
        run: |
          # Create dummy files so the compiler doesn't look for official secrets
          mkdir -p app/ wear/ automotive/
          echo '{"project_info":{"project_number":"1","project_id":"hadev"},"client":[{"client_info":{"mobilesdk_app_id":"1:1:android:1"}}] }' > app/google-services.json
          cp app/google-services.json wear/google-services.json
          cp app/google-services.json automotive/google-services.json

      - name: Build APK
        # continue-on-error ensures the 'Upload' step runs even if Gradle exits with 1
        continue-on-error: true 
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleFullDebug \
            -x versionFile \
            --no-configuration-cache \
            --no-daemon \
            --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Hei-Koti-Final-APK
          # This path looks for any APK generated in the full/debug folder
          path: app/build/outputs/apk/full/debug/*.apk
          if-no-files-found: error
