name: Custom Build

on:
  workflow_dispatch: # This gives you the "Run" button

jobs:
  build_apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Mock Google Services
        run: |
          cp .github/mock-google-services.json app/google-services.json
          cp .github/mock-google-services.json wear/google-services.json
          cp .github/mock-google-services.json automotive/google-services.json

      - name: Build APK
        run: |
          chmod +x gradlew
          # We add '-x versionFile' to skip the task that caused your crash
          ./gradlew :app:assembleFullDebug -x versionFile --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Hei-Koti-App
          path: app/build/outputs/apk/full/debug/*.apk