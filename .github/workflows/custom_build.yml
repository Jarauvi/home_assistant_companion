name: Manual Build
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Force Disable Cache & Mock Secrets
        run: |
          # 1. Force gradle.properties to disable the failing cache
          sed -i 's/org.gradle.configuration-cache=true/org.gradle.configuration-cache=false/g' gradle.properties
          echo "org.gradle.vfs.watch=false" >> gradle.properties
          
      - name: Mock Google Services
        run: |
          # Create a JSON that specifically includes the Home Assistant debug package name
          echo '{
            "project_info": {"project_number": "12345", "project_id": "hadev"},
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:12345:android:12345",
                  "android_client_info": {
                    "package_name": "io.homeassistant.companion.android.debug"
                  }
                },
                "api_key": [{"current_key": "mock_key"}],
                "services": {"appinvite_service": {"other_platform_oauth_client": []}}
              }
            ],
            "configuration_version": "1"
          }' > app/google-services.json
          
          # Copy it to the other modules just in case
          cp app/google-services.json wear/google-services.json
          cp app/google-services.json automotive/google-services.json
      - name: Build
        run: |
          chmod +x gradlew
          # -x versionFile: skips the versioning crash
          # -x lint: skips slow code checks to save time
          ./gradlew :app:assembleFullDebug -x versionFile -x lint --no-daemon

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: HomeAssistantCustom
          path: app/build/outputs/apk/full/debug/*.apk
